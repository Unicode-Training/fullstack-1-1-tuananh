    <form>
      <div>
        <label for="name">Họ tên</label>
        <input type="text" id="name" placeholder="Nhập họ tên..." />
      </div>
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Nhập email..." />
      </div>
      <div>
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" placeholder="Nhập mật khẩu..." />
      </div>
      <div>
        <label for="age">Tuổi</label>
        <input type="number" id="age" placeholder="Nhập tuổi..." />
      </div>
      <div>
        <label for="avatar">Avatar</label>
        <input type="file" id="avatar" />
      </div>
      <div>
        <label>Giới tính</label>
        <label>
          <input type="radio" name="gender" value="male" />
          Nam
        </label>
        <label>
          <input type="radio" name="gender" value="female" />
          Nữ
        </label>
        <label>
          <input type="radio" name="gender" value="unknown" />
          Không biết
        </label>
      </div>
      <div>
        <label>Nguồn</label>
        <label>
          <input type="checkbox" name="source" value="Facebook" />
          Facebook
        </label>
        <label>
          <input type="checkbox" name="source" value="Google" />
          Google
        </label>
        <label>
          <input type="checkbox" name="source" value="Website" />
          Website
        </label>
      </div>
      <div>
        <label for="province">Tỉnh/Thành phố</label>
        <select id="province" name="province">
          <option value="">Chọn Tỉnh/Thành phố</option>
          <option value="1">Hà Nội</option>
          <option value="2">Đà Nẵng</option>
          <option value="3">Hồ Chí Minh</option>
        </select>
      </div>
      <div>
        <label for="message">Tin nhắn</label>
        <textarea
          id="message"
          name="message"
          placeholder="Nội dung tin nhắn..."
        ></textarea>
      </div>
      <div>
        <label for="birthday">Ngày sinh</label>
        <input type="date" id="birthday" />
      </div>
      <button>Gửi</button>
    </form>
  </body>
