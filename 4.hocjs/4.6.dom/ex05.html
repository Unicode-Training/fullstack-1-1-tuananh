<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        border: 0;
      }
      button {
        padding: 10px 30px;
        background: green;
        color: #fff;
        cursor: move;
        position: relative;
        z-index: 100;
      }
      .box {
        width: 200px;
        height: 200px;
        border: 5px dotted red;
        position: absolute;
        right: 0;
        bottom: 0;
        margin: 70px;
      }
      .box.active {
        background: yellow;
      }
      .box.drop {
        background: rgb(172, 124, 4);
      }
    </style>
  </head>
  <body>
    <button>Click me</button>
    <div class="box"></div>
    <script src="js/ex05.js"></script>
  </body>
</html>
