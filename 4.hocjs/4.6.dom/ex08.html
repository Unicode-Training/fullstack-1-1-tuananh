<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box {
        max-width: 80%;
        margin: 30px auto;
        border: 1px solid red;
        padding: 30px;
      }
      .item {
        padding: 20px;
      }
      .up,
      .down {
        cursor: pointer;
      }
      .up {
        color: green;
      }
      .down {
        color: red;
      }
      .selected {
        border: 2px dotted green;
      }
      .context-menu {
        list-style: none;
        background: rgb(197, 197, 197);
        margin: 0;
        padding: 10px;
        display: none;
        position: absolute;
      }
      .context-menu li {
        cursor: pointer;
        margin: 5px 0;
      }
      .modal {
        display: none;
      }
      .modal.show {
        display: block;
      }
      .modal .modal-dialog {
        position: absolute;
        left: 0;
        right: 0;
        top: 50%;
        translate: 0 -50%;
        margin: 0 auto;
        width: 50%;
        background: #fff;
        padding: 20px;
        border: 1px solid #ddd;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 100;
      }
      .modal .modal-overlay {
        position: absolute;
        inset: 0;
        background: #00000083;
        z-index: 90;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="item">
        Item 1
        <span class="up">Up</span>
        <span class="down">Down</span>
      </div>
      <div class="item">
        Item 2
        <span class="up">Up</span>
        <span class="down">Down</span>
      </div>
      <div class="item">
        Item 3
        <span class="up">Up</span>
        <span class="down">Down</span>
      </div>
      <div class="item">
        Item 4
        <span class="up">Up</span>
        <span class="down">Down</span>
      </div>
    </div>
    <ul class="context-menu">
      <li class="rename">Đổi tên</li>
      <li class="delete">Xóa</li>
    </ul>
    <div class="modal">
      <div class="modal-dialog">
        <form>
          <input type="text" />
          <button>Save</button>
        </form>
      </div>
      <div class="modal-overlay"></div>
    </div>
    <script src="js/ex08.js"></script>
  </body>
</html>
