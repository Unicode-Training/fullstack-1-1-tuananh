<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <main class="py-3 max-w-[90%] mx-auto">
      <h2 class="text-3xl text-center">Danh sách sản phẩm</h2>
      <button class="js-add-btn px-3 py-1 bg-green-600 text-white">
        Thêm mới
      </button>
      <input
        type="search"
        class="js-search px-3 py-1 outline-none border border-[#ddd] my-3 w-full"
        placeholder="Search..."
      />
      <div class="js-product-list flex flex-wrap my-3 -mx-3"></div>
      <div class="js-pagination flex flex-wrap gap-2"></div>
    </main>
    <div class="js-modal hidden">
      <div
        class="js-modal-content absolute left-0 right-0 top-[10%] max-w-3/4 mx-auto bg-white border border-[#ddd] p-3 z-50"
      >
        <span class="text-2xl text-center block">Loading...</span>
      </div>
      <div class="js-modal-overlay absolute inset-0 z-40 bg-black/50"></div>
    </div>
    <script src="js/ex01.js"></script>
  </body>
</html>
